
services:
  postgres:
    image: postgres:16-alpine
    container_name: cure-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cure
      POSTGRES_PASSWORD: cure
      POSTGRES_DB: cure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cure"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cure-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cure-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: ""
      CORS_ORIGIN: "http://localhost:3000"
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: cure
      DATABASE_PASSWORD: cure
      DATABASE_NAME: cure
      DATABASE_SSL: "false"
      DB_SYNCHRONIZE: "false"
      DB_MIGRATIONS_RUN: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-access-secret-at-least-32-chars-long-security
      JWT_REFRESH_SECRET: change-me-refresh-secret-at-least-32-chars-long-security
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 120
      SEED_ADMIN_EMAIL: admin@cure.local
      SEED_ADMIN_PASSWORD: ChangeMe123!
      SEED_ADMIN_FIRST_NAME: CURE
      SEED_ADMIN_LAST_NAME: Admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
